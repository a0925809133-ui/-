<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe.Aura 靈魂能量全方位客製化分析</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8N4N5R8.png">
    <style>
        :root { --primary: #7b68ee; --gold: #c6a059; --bg: #fdfdfd; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; color: #333; margin: 0; padding-bottom: 50px;}
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(123, 104, 238, 0.1); max-width: 500px; margin: auto; }
        
        /* Logo 區域 */
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 8px rgba(198, 160, 89, 0.3); }
        .brand-name { font-size: 1.5em; color: var(--gold); font-weight: bold; margin-top: 10px; }
        
        h2 { color: var(--primary); text-align: center; font-size: 1.3em; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; background: #fafafa; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        
        button.btn-calc { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #6a5acd); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button.btn-calc:hover { box-shadow: 0 4px 12px rgba(123, 104, 238, 0.3); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #loadingStatus { margin-top: 20px; text-align: center; color: var(--primary); font-weight: bold; display: none; }
        
        .info-footer { font-size: 0.85em; color: #888; text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;}
        .ig-connect { display: block; width: 80%; margin: 25px auto 0 auto; padding: 12px; background: #fff; color: var(--gold); border: 2px solid var(--gold); text-align: center; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .ig-connect:hover { background: var(--gold); color: white; box-shadow: 0 4px 10px rgba(198, 160, 89, 0.4); }
    </style>
</head>
<body>

<div class="card">
    <div class="brand-header">
        <img src="https://i.imgur.com/HnUjUbe.png" alt="Vibe.Aura Logo" class="brand-logo">
        <div class="brand-name">Vibe.Aura</div>
    </div>
    
    <h2>✨ 馬雅圖騰 × 生命靈數全方位分析</h2>
    
    <form id="appForm" onsubmit="fetchMayaAndSendToMake(event)">
        <div class="input-group">
            <label>顧客姓名</label>
            <input type="text" id="name" required placeholder="請輸入您的姓名">
        </div>
        <div class="input-group">
            <label>西元生日</label>
            <input type="date" id="birthday" required>
        </div>
        <div class="input-group">
            <label>性別</label>
            <select id="gender">
                <option value="女">女</option>
                <option value="男">男</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="input-group">
            <label>手圍 (cm)</label>
            <input type="number" id="wrist" placeholder="例如: 15.5" step="0.1" required>
        </div>
        <button type="submit" id="submitBtn" class="btn-calc">啟動大師占卜並提交訂單 🔮</button>
    </form>

    <div id="loadingStatus">🔮 大師正在遠端連線馬雅曆法數據中，請稍候...</div>

    <div class="info-footer">
        *本系統已精準對接馬雅圖騰查詢系統，由 Vibe.Aura 後台大腦即時調配。
    </div>

    <a href="https://www.instagram.com/vibe.aura2026?igsh=MWxwdmkyMnJjeGNkbw%3D%3D&utm_source=qr" target="_blank" class="ig-connect">
        私訊 Vibe.Aura 聯絡大師
    </a>
</div>

<script>
    // 計算生命靈數主命數與缺數的函式
    function getNumerology(bdayStr) {
        const nums = bdayStr.split("").map(Number);
        let sum = nums.reduce((a, b) => a + b, 0);
        while (sum > 9) {
            sum = sum.toString().split("").map(Number).reduce((a, b) => a + b, 0);
        }
        const birthSet = new Set(nums);
        let missing = [];
        for (let i = 1; i <= 9; i++) {
            if (!birthSet.has(i)) missing.push(i);
        }
        return { mainNum: sum, missingNums: missing.join(", ") };
    }

    async function fetchMayaAndSendToMake(event) {
        event.preventDefault();
        
        const makeWebhookUrl = "https://hook.us2.make.com/71xg8fa26wxkwkxct1edfscpy9inxgsg"; 

        const name = document.getElementById('name').value;
        const birthday = document.getElementById('birthday').value; // 格式: YYYY-MM-DD
        const gender = document.getElementById('gender').value;
        const wrist = document.getElementById('wrist').value;
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingStatus = document.getElementById('loadingStatus');
        
        submitBtn.disabled = true;
        loadingStatus.style.display = 'block';

        const pureBday = birthday.replace(/-/g, ""); // 變為 YYYYMMDD
        const parts = birthday.split("-");
        const year = parts[0];
        const month = parseInt(parts[1], 10);
        const day = parseInt(parts[2], 10);

        // 先計算好生命靈數
        const numResult = getNumerology(pureBday);

        let detectedTotem = "無法自動取得（交由Gemini推算）";

        try {
            // 💡 核心技術：利用公開的 CORS 代理伺服器，模擬瀏覽器去爬取 glowing.cc 該生日的馬雅頁面
            const targetUrl = `https://glowing.cc/1328?year=${year}&month=${month}&day=${day}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            
            const proxyResponse = await fetch(proxyUrl);
            if (proxyResponse.ok) {
                const proxyData = await proxyResponse.json();
                const htmlText = proxyData.contents;
                
                // 運用正則表達式，在網頁源碼中搜尋包含「KIN」或「圖騰名稱」的區塊
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // 嘗試抓取 glowing.cc 的關鍵圖騰文字標籤 (對應其網頁結構)
                const titleEl = doc.querySelector('title') || doc.querySelector('h1') || doc.querySelector('.kin-title');
                if (titleEl && titleEl.innerText) {
                    detectedTotem = titleEl.innerText.trim();
                } else {
                    // 備用正則搜尋法
                    const match = htmlText.match(/KIN\s*\d+|紅龍|白風|藍夜|黃種子|紅蛇|白世界橋|藍手|黃星星|紅月|白狗|藍猴|黃人|紅天行者|白巫師|藍鷹|黃戰士|紅地球|白鏡|藍風暴|黃太陽/);
                    if (match) detectedTotem = match[0];
                }
            }
        } catch (e) {
            console.log("自動查馬雅圖騰受阻，將交由後台Gemini大腦做精準萬年曆補位算命。", e);
        }

        // 🛍️ 打包一整包無懈可擊的超豐富資料，發射給 Make Webhook
        const payload = {
            customer_name: name,
            birthday_text: pureBday,
            gender: gender,
            wrist_size: wrist,
            calculated_main_number: numResult.mainNum,
            calculated_missing_numbers: numResult.missingNums,
            glowing_cc_scraped_totem: detectedTotem, // 這裡就是從 glowing.cc 抓來的絕對精準圖騰！
            source_url: `https://glowing.cc/1328?year=${year}&month=${month}&day=${day}`
        };

        try {
            const response = await fetch(makeWebhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert(`🎉 全方位能量連結成功！\n\n網頁已成功對接 glowing.cc 查出您的馬雅印記，並連同生命靈數傳送給 Vibe.Aura 後台！\n\n大師正在為【${name}】調配水晶，請立刻前往 LINE 聊天室查看最準確的報告與配置明細！`);
                document.getElementById('appForm').reset();
            } else {
                alert("❌ 系統通訊有些微磁場干擾，請稍後再試。");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("❌ 網路連結中斷，請確認連線狀態。");
        } finally {
            submitBtn.disabled = false;
            loadingStatus.style.display = 'none';
        }
    }
</script>

</body>
</html>
